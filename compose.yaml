services:
  postgres:
    image: dhi.io/postgres:18-alpine3.22
    environment:
      POSTGRES_PASSWORD: mypassword
    volumes:
      - postgres-data:/var/lib/postgresql
    ports:
      - 5432:5432
  mailpit:
    image: axllent/mailpit:v1.27.4
    ports:
      - 8025:8025
      - 1025:1025
volumes:
  postgres-data:
